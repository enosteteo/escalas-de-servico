name: igreja_em_escala
description: "A church service scheduling app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  go_router: ^14.6.2
  uuid: ^4.5.1
  pdf: ^3.11.3
  printing: ^5.13.7
  intl: ^0.20.2
  path_provider: ^2.1.5
  file_picker: ^8.1.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
